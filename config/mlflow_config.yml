# MLflow Configuration for Nexus Knowledge Engine
# (canonical location; symlinked from mlops/mlflow_config.yml)

mlflow_tracking_uri: "http://localhost:5001"
mlflow_registry_uri: "http://localhost:5001"

default_experiment_name: "nexus_knowledge_engine"
experiment_tags:
  project: "nexus"
  team: "ai-engineering"
  version: "1.0.0"

model_settings:
  embedding_model:
    name: "sentence-transformers/all-MiniLM-L6-v2"
    dimensions: 384
    max_sequence_length: 512
  llm_model:
    name: "meta-llama/Llama-2-7b-chat-hf"
    temperature: 0.1
    max_tokens: 1000
    top_p: 0.9

evaluation:
  golden_dataset_path: "data/golden_dataset.json"
  metrics:
    - "answer_similarity"
    - "retrieval_accuracy"
    - "confidence_score"
    - "response_time"
  thresholds:
    answer_similarity: 0.8
    retrieval_accuracy: 0.75
    confidence_score: 0.7

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/mlflow.log"

monitoring:
  alert_thresholds:
    response_time: 5.0
    error_rate: 0.05
    confidence_drop: 0.2
  check_interval: 300

data:
  chunk_size: 1000
  chunk_overlap: 200
  max_file_size: 104857600
  supported_formats: ["pdf", "txt", "md"]
