name: CI — Lint, Test & Evaluate

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

env:
  NEXUS_API_URL: http://localhost:8002

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Run ruff linter
        run: ruff check backend/app/ backend/scripts/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Start Docker services
        run: |
          docker compose -f docker-compose.dev.yml up -d --build
          echo "Waiting for API..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8002/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:8002/health || exit 1

      - name: Seed test data
        run: make dev-seed

      - name: Upload test document
        run: |
          curl -sf -X POST http://localhost:8002/documents/upload \
            -F "file=@backend/tests/test_document.pdf" || echo "Upload may have already existed"

      - name: Run pytest with coverage
        run: |
          cd backend && python -m pytest tests/ \
            -v --tb=short \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Run golden dataset evaluation
        run: python backend/scripts/run_evaluation.py

      - name: Archive evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: data/evaluations/*.json

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
